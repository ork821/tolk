services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-tolk}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=peer --data-checksums"
      APP_DB_USER: ${APP_DB_USER}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
      - "-c"
      - "hba_file=/etc/postgresql/pg_hba.conf"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/config/postgresql.prod.conf:/etc/postgresql/postgresql.conf:ro
      - ./database/config/pg_hba.prod.conf:/etc/postgresql/pg_hba.conf:ro
      - ./database/tables.sql:/docker-entrypoint-initdb.d/01-tables.sql:ro
      - ./database/functions.sql:/docker-entrypoint-initdb.d/02-functions.sql:ro
      - ./database/init.sh:/docker-entrypoint-initdb.d/03-init.sh:ro
      - ./database/defaults.sql:/docker-entrypoint-initdb.d/04-defaults.sql:ro
    shm_size: 1gb
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          memory: 768M
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - backend_net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - TOLK_AllowedHosts=${DOMAIN}
      - ConnectionStrings__DataBase=Host=${DB_HOST:-db};Port=${DB_PORT:-5432};Database=${DB_NAME:-tolk};Username=${APP_DB_USER};Password=${APP_DB_PASSWORD}
      - JwtSettings__AccessSecret=${JWT_ACCESS_SECRET}
      - JwtSettings__RefreshTokenHashSecret=${JWT_REFRESH_TOKEN_HASH_SECRET}
      - TOLK_Host=https://${DOMAIN}
      - TOLK_AllowedOrigins__0=https://${DOMAIN}
    read_only: true
    tmpfs:
      - /tmp
      - /app/attachments:uid=1654,gid=1654
      - /app/avatars:uid=1654,gid=1654
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          memory: 256M
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend_net
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: https://${DOMAIN}/api
        NEXT_PUBLIC_VK_APP_ID: ${NEXT_PUBLIC_VK_APP_ID}
    environment:
      - NEXT_PUBLIC_API_BASE_URL=https://${DOMAIN}/api
      - NEXT_PUBLIC_VK_APP_ID=${NEXT_PUBLIC_VK_APP_ID}
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache:uid=1001,gid=1001
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend_net

  nginx:
    image: nginxinc/nginx-unprivileged:stable-alpine
    command:
      - /bin/sh
      - -ec
      - |
        mkdir -p /tmp/nginx
        envsubst '${DOMAIN}' < /etc/nginx/templates/nginx.conf.template > /tmp/nginx/nginx.conf
        exec nginx -c /tmp/nginx/nginx.conf -g 'daemon off;'
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required}
    ports:
      - "80:8080"
      - "443:8443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/templates/nginx.conf.template:ro
      - ${SSL_CERT_PATH}:/etc/nginx/ssl/server.crt:ro
      - ${SSL_KEY_PATH}:/etc/nginx/ssl/server.key:ro
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend_net

networks:
  backend_net:
    driver: bridge

volumes:
  pgdata:
