services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: tolk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_dev_password}
      PGDATA: /var/lib/postgresql/18/docker
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=peer --data-checksums"
      APP_DB_USER: ${APP_DB_USER:-backend}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-backend_dev_password}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata_spa:/var/lib/postgresql
      - ./database/tables.sql:/docker-entrypoint-initdb.d/01-tables.sql:ro
      - ./database/functions.sql:/docker-entrypoint-initdb.d/02-functions.sql:ro
      - ./database/init.sh:/docker-entrypoint-initdb.d/03-init.sh:ro
      - ./database/defaults.sql:/docker-entrypoint-initdb.d/04-defaults.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      TOLK_AllowedHosts: localhost
      ConnectionStrings__DataBase: Host=db;Port=5432;Database=tolk;Username=${APP_DB_USER:-backend};Password=${APP_DB_PASSWORD:-backend_dev_password}
      JwtSettings__AccessSecret: ${JWT_ACCESS_SECRET:-local_access_secret_change_me}
      JwtSettings__RefreshTokenHashSecret: ${JWT_REFRESH_TOKEN_HASH_SECRET:-local_refresh_secret_change_me}
      TOLK_Host: http://localhost
      TOLK_AllowedOrigins__0: http://localhost
    ports:
      - "127.0.0.1:3000:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./frontend-spa
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_VK_APP_ID: ${VITE_VK_APP_ID:-54657171}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  nginx:
    image: nginxinc/nginx-unprivileged:stable-alpine
    ports:
      - "127.0.0.1:80:8080"
    volumes:
      - ./nginx/nginx.spa.gateway.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata_spa:
