services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: tolk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_dev_password}
      APP_DB_USER: ${APP_DB_USER:-backend}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-backend_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/Database/tables.sql:/docker-entrypoint-initdb.d/01-tables.sql
      - ./backend/src/Database/functions.sql:/docker-entrypoint-initdb.d/02-functions.sql
      - ./backend/src/Database/init.sh:/docker-entrypoint-initdb.d/03-init.sh:ro
    restart: unless-stopped

  nginx:
    image: nginxinc/nginx-unprivileged:stable-alpine
    ports:
      - "127.0.0.1:80:8080"
      - "[::1]:80:8080"
    volumes:
      - ./nginx/nginx.local.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "host.docker.internal.ipv4:192.168.65.254"
    restart: unless-stopped

volumes:
  pgdata:
