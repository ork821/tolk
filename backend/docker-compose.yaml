services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: "tolk"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "qweASD123"
      PGDATA: "/var/lib/postgresql/data/pgdata"
    volumes:
      - ./pgdata:/var/lib/postgresql/data/pgdata
      - ./src/Database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./src/Database/tables.sql:/docker-entrypoint-initdb.d/02-tables.sql
      - ./src/Database/functions.sql:/docker-entrypoint-initdb.d/03-functions.sql
    ports:
      - "5432:5432"
    restart: unless-stopped