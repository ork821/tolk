server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # The static export contains one shell for each dynamic route. Keep the
    # original browser URL while serving the corresponding shell file.
    location ~ ^/p/[^/]+/?$ {
        rewrite ^ /p/__spa__/index.html break;
    }

    location ~ ^/u/[^/]+/following/?$ {
        rewrite ^ /u/__spa__/following/index.html break;
    }

    location ~ ^/u/[^/]+/followers/?$ {
        rewrite ^ /u/__spa__/followers/index.html break;
    }

    location ~ ^/u/[^/]+/?$ {
        rewrite ^ /u/__spa__/index.html break;
    }

    location / {
        try_files $uri $uri/ /404.html;
    }
}
