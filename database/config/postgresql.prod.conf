# Production PostgreSQL baseline for a containerized single-primary deployment.
# Tune memory values after measuring the target host and workload.

listen_addresses = '*'
port = 5432
password_encryption = 'scram-sha-256'

# Connections and memory
max_connections = 100
shared_buffers = '512MB'
effective_cache_size = '1536MB'
work_mem = '16MB'
maintenance_work_mem = '256MB'
temp_buffers = '16MB'

# WAL, durability, and checkpoints
wal_level = 'replica'
fsync = on
synchronous_commit = on
full_page_writes = on
wal_compression = on
checkpoint_timeout = '15min'
checkpoint_completion_target = 0.9
max_wal_size = '4GB'
min_wal_size = '512MB'

# Query planning and statistics
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 200
track_io_timing = on

# Runtime safety limits
idle_in_transaction_session_timeout = '2min'
statement_timeout = '30s'
lock_timeout = '5s'
deadlock_timeout = '1s'
temp_file_limit = '1GB'

# Autovacuum tuned for write-heavy social feeds.
autovacuum = on
autovacuum_max_workers = 5
autovacuum_naptime = '10s'
autovacuum_vacuum_scale_factor = 0.03
autovacuum_analyze_scale_factor = 0.015
autovacuum_vacuum_cost_limit = 2000
autovacuum_vacuum_cost_delay = '2ms'

# Security and auditing signals.
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = '250ms'
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = '16MB'
log_line_prefix = '%m [%p] %u@%d %r '

# Keep timestamps deterministic across containers.
timezone = 'UTC'
log_timezone = 'UTC'
